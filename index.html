<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sophisam</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#fff;
}

/* HEADER */
header{
  background:#f2dcdb;
  padding:15px;
  display:flex;
  justify-content:space-between;
}

nav a{
  margin:0 10px;
  text-decoration:none;
  color:#333;
}

/* PRODUCTOS */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  border:1px solid #eee;
  padding:15px;
  text-align:center;
}

.btn{
  background:#ff4da6;
  color:#fff;
  padding:10px;
  border:none;
  cursor:pointer;
}

/* CARRITO */
.cart{
  position:fixed;
  right:0;
  top:0;
  width:250px;
  height:100%;
  background:#fff;
  border-left:1px solid #ccc;
  padding:15px;
  overflow:auto;
}

</style>
</head>

<body>

<header>
  <div>Sophisam</div>
  <nav>
    <a href="#">Inicio</a>
    <a href="#">Productos</a>
  </nav>
</header>

<div class="products">

  <div class="card">
    <p>Limpiador facial</p>
    <p>$59.900</p>
    <button class="btn" onclick="addToCart('Limpiador facial',59900)">Agregar</button>
  </div>

  <div class="card">
    <p>Crema hidratante</p>
    <p>$49.900</p>
    <button class="btn" onclick="addToCart('Crema hidratante',49900)">Agregar</button>
  </div>

</div>

<div class="cart">
  <h3>Carrito</h3>
  <div id="cartItems"></div>
  <p>Total: $<span id="total">0</span></p>
  <a id="buyBtn" href="#" target="_blank">Comprar por WhatsApp</a>
</div>

<script>
let cart = [];
let total = 0;

function addToCart(name, price){
  cart.push({name, price});
  total += price;
  renderCart();
}

function renderCart(){
  let itemsHTML = "";
  cart.forEach(item => {
    itemsHTML += `<p>${item.name} - $${item.price}</p>`;
  });

  document.getElementById("cartItems").innerHTML = itemsHTML;
  document.getElementById("total").innerText = total;

  let message = "Hola quiero comprar:%0A";
  cart.forEach(item => {
    message += "- " + item.name + "%0A";
  });

  document.getElementById("buyBtn").href =
    "https://wa.me/573001234567?text=" + message;
}
</script>

</body>
</html>
