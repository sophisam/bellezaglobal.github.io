<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sophisam</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#fff;
}

/* HEADER */
header{
  background:#fff;
  padding:15px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #eee;
}

.logo{
  font-size:22px;
  font-weight:bold;
}

nav a{
  margin:0 15px;
  text-decoration:none;
  color:#333;
}

nav a:hover{
  color:#ff4da6;
}

/* HERO */
.hero{
  background:#f2dcdb;
  padding:60px 20px;
  text-align:center;
}

.hero h1{
  font-size:32px;
}

/* FILTROS (simulación) */
.filters{
  padding:20px 40px;
  border-bottom:1px solid #eee;
}

.filters span{
  margin-right:15px;
  cursor:pointer;
  font-weight:bold;
}

/* GRID PRODUCTOS */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:25px;
  padding:40px;
}

.card{
  text-align:center;
}

.card img{
  width:100%;
  height:250px;
  object-fit:cover;
}

.card p{
  margin:10px 0;
}

.price{
  color:#ff4da6;
  font-weight:bold;
}

.btn{
  background:#ff4da6;
  color:#fff;
  padding:10px 15px;
  border:none;
  cursor:pointer;
}

/* CARRITO */
.cart{
  position:fixed;
  right:0;
  top:0;
  width:250px;
  height:100%;
  background:#fff;
  border-left:1px solid #ccc;
  padding:15px;
  overflow:auto;
}

</style>
</head>

<body>

<header>
  <div class="logo">Sophisam</div>
  <nav>
    <a href="#">Sobre</a>
    <a href="#">Tips</a>
    <a href="#">Productos</a>
  </nav>
</header>

<div class="hero">
  <h1>Cuidado del cabello</h1>
  <p>Descubre los mejores productos</p>
</div>

<div class="filters">
  <span>Todos</span>
  <span>Tratamiento</span>
  <span>Hidratación</span>
  <span>Reparación</span>
</div>

<div class="products">

  <div class="card">
    <img src="https://via.placeholder.com/300">
    <p>Shampoo hidratante</p>
    <div class="price">$39.900</div>
    <button class="btn" onclick="addToCart('Shampoo',39900)">Agregar</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300">
    <p>Acondicionador</p>
    <div class="price">$34.900</div>
    <button class="btn" onclick="addToCart('Acondicionador',34900)">Agregar</button>
  </div>

</div>

<div class="cart">
  <h3>Carrito</h3>
  <div id="cartItems"></div>
  <p>Total: $<span id="total">0</span></p>
  <a id="buyBtn" href="#" target="_blank">Comprar por WhatsApp</a>
</div>

<script>
let cart = [];
let total = 0;

function addToCart(name, price){
  cart.push({name, price});
  total += price;
  renderCart();
}

function renderCart(){
  let itemsHTML = "";
  cart.forEach(item => {
    itemsHTML += `<p>${item.name} - $${item.price}</p>`;
  });

  document.getElementById("cartItems").innerHTML = itemsHTML;
  document.getElementById("total").innerText = total;

  let message = "Hola quiero comprar:%0A";
  cart.forEach(item => {
    message += "- " + item.name + "%0A";
  });

  document.getElementById("buyBtn").href =
    "https://wa.me/573001234567?text=" + message;
}
</script>

</body>
</html>
